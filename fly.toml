app = "digitaliza-sodexo"

[build]
  dockerfile = "face-api/Dockerfile.fly"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "180s"
    method = "GET"
    path = "/health"
